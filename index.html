<style>
  :root {
    --pink: #F8DADB;
    --pink-soft: #FDEDEE;
    --ink: #111111;
    --muted: #6B6B6B;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: var(--pink-soft);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Soft pink blob backdrop — echoes the welcome screen */
  .stage {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px 48px;
    overflow: hidden;
  }
  .stage::before {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -45%;
    transform: translateX(-50%);
    width: 140vmax;
    height: 140vmax;
    background: var(--pink);
    border-radius: 50%;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }

  .logo-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--ink);
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 32px rgba(17,17,17,0.18);
  }
  .logo-circle svg { width: 48px; height: 48px; }

  .wordmark { height: 38px; margin: 0 auto 8px; display: block; }

  .tagline {
    font-size: 16px;
    color: var(--muted);
    margin: 0 0 36px;
    font-weight: 500;
  }

  .stores { display: flex; flex-direction: column; gap: 12px; align-items: center; }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    max-width: 280px;
    padding: 14px 22px;
    background: var(--ink);
    color: #fff;
    text-decoration: none;
    border-radius: 14px;
    font-weight: 600;
    font-size: 15px;
    transition: transform .15s ease, box-shadow .15s ease;
    box-shadow: 0 6px 18px rgba(17,17,17,0.22);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(17,17,17,0.28); }
  .btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .btn .sub { font-size: 10px; opacity: .75; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
  .btn .main { font-size: 15px; line-height: 1.1; }
  .btn .stack { display: flex; flex-direction: column; align-items: flex-start; }

  .footer {
    position: relative;
    z-index: 1;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 16px;
  }
</style>
